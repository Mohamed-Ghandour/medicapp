spring:
  application:
    name: medicapp-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/medicapp}
    username: ${SPRING_DATASOURCE_USERNAME:medicapp}
    password: ${SPRING_DATASOURCE_PASSWORD:medicapp}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

medicapp:
  jwt:
    # HS256: use at least 32 bytes in production
    secret: ${JWT_SECRET:dev-only-change-me-32chars-minimum!!}
    access-token-minutes: 15
    refresh-token-days: 14

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.springframework.security: DEBUG
